name: SimplePenNote
options:
  bundleIdPrefix: com.blueCode
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  defaultConfig: Release
  developmentLanguage: ko
  knownRegions:
    - ko
    - en

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_STRICT_CONCURRENCY: targeted

targets:
  SimplePenNote:
    type: application
    platform: iOS
    sources:
      - path: SimplePenNote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blueCode.SimplePenNote
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: KUDC7C6Z9H
        CODE_SIGN_ENTITLEMENTS: SimplePenNote/SimplePenNote.entitlements
    info:
      path: SimplePenNote/Resources/Info.plist
      properties:
        CFBundleName: SimplePenNote
        CFBundleDisplayName: SimplePenNote
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
